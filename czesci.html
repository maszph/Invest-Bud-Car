<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Części - InvestBudCar</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="bg-black text-white">

<header class="subpage-header fixed w-full z-50">
  <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
    <img src="logo.png" class="h-10">
    <a href="index.html" class="flex items-center gap-2 text-yellow-400 hover:text-white text-lg">
      ← Powrót do strony głównej
    </a>
  </div>
</header>

<section class="pt-24 pb-20">
  <div class="max-w-7xl mx-auto px-6">
    <h1 class="text-4xl font-semibold mb-10">Części zamienne</h1>

    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6" id="parts-grid">
      <!-- Części będą dodane przez JS -->
    </div>
  </div>
</section>

<!-- MODAL -->
<div id="modal" class="hidden fixed inset-0 bg-black/90 z-[9999] flex items-center justify-center">
  <div class="max-w-4xl w-full mx-4 relative">
    <button onclick="closeModal()" class="absolute -top-10 right-0 text-white text-4xl hover:text-yellow-400">✕</button>
    <img id="modal-image" class="w-full rounded-2xl shadow-2xl" alt="">
    <h2 id="modal-name" class="text-3xl font-medium text-center mt-6 text-white"></h2>
  </div>
</div>

<footer class="bg-black border-t border-white/10 py-6 text-center text-white/50 text-sm">
  © 2026 InvestBudCar
</footer>

<script>
const parts = [
  {name: "Filtr hydrauliczny", img: "0.jpg"},
  {name: "Pompa hydrauliczna", img: "1.jpg"},
  {name: "Opony przemysłowe 16/70-20", img: "2.jpg"},
  {name: "Zespół świateł LED", img: "3.jpg"},
  {name: "Tarcza hamulcowa", img: "4.jpg"},
  {name: "Wąż wysokociśnieniowy", img: "5.jpg"},
  {name: "Akumulator 12V 180Ah", img: "6.jpg"},
  {name: "Łożysko koła", img: "7.jpg"}
];

const grid = document.getElementById('parts-grid');
parts.forEach(part => {
  const div = document.createElement('div');
  div.className = "bg-white/10 rounded-2xl overflow-hidden cursor-pointer hover:scale-105 transition";
  div.innerHTML = `
    <div class="aspect-square bg-cover bg-center" style="background-image: url('${part.img}')"></div>
    <div class="p-4 text-center font-medium">${part.name}</div>
  `;
  div.onclick = () => showModal(part);
  grid.appendChild(div);
});

function showModal(part) {
  document.getElementById('modal-image').src = part.img;
  document.getElementById('modal-name').textContent = part.name;
  document.getElementById('modal').classList.remove('hidden');
  document.getElementById('modal').classList.add('flex');
}

function closeModal() {
  const modal = document.getElementById('modal');
  modal.classList.add('hidden');
  modal.classList.remove('flex');
}
</script>
</body>
</html>
